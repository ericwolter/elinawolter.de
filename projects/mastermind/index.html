<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elinas Mastermind</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Elinas Mastermind</h1>
        <p>Knacke den geheimen Farbcode.</p>
      </header>

      <section class="secret-area" aria-label="Geheimer Code">
        <div class="secret-code" id="secretCode"></div>
        <div class="status" id="status" role="status" aria-live="polite">
          Drücke auf „Neues Spiel“.
        </div>
      </section>

      <section class="controls" aria-label="Werkzeuge">
        <div class="color-area">
          <h2 class="hidden-title">Farben</h2>
          <div class="colors" id="colors"></div>
        </div>

        <div class="buttons">
          <button id="newGameButton" type="button">Neues Spiel</button>
          <button id="checkButton" type="button">Bewerten</button>
          <button id="clearButton" type="button">Reihe leeren</button>
        </div>
      </section>

      <section>
        <h2 class="hidden-title">Spielfeld</h2>
        <div class="board" id="board" aria-label="Ratefeld"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
