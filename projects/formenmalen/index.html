<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Elinas Schildkröten-Malspiel</title>
    <link rel="stylesheet" href="style.css?v=20260619e">
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Elinas Schildkröten-Malspiel</h1>
        <p>Male bunte Spuren mit der Schildkröte.</p>
      </header>

      <section class="buehne" aria-label="Malfeld">
        <div class="malfeld-rahmen">
          <canvas id="malfeld" width="672" height="384"></canvas>
          <div id="schildkroete" aria-hidden="true">🐢</div>
        </div>
      </section>

      <p class="status" id="status" role="status" aria-live="polite">
        Bewege die Schildkröte mit den Pfeiltasten oder den Knöpfen.
      </p>

      <section class="werkzeuge" aria-label="Werkzeuge">
        <button id="farbe" type="button">
          <span id="farbpunkt" aria-hidden="true"></span>
          Farbe wechseln
        </button>
        <button id="neu" type="button">Alles wegwischen</button>
      </section>

      <section class="pfeile" aria-label="Pfeilsteuerung">
        <button data-richtung="oben" type="button" aria-label="Nach oben">↑</button>
        <div>
          <button data-richtung="links" type="button" aria-label="Nach links">←</button>
          <button data-richtung="unten" type="button" aria-label="Nach unten">↓</button>
          <button data-richtung="rechts" type="button" aria-label="Nach rechts">→</button>
        </div>
      </section>
    </main>

    <script src="script.js?v=20260619e"></script>
  </body>
</html>
